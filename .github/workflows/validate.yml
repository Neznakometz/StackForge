name: validate
on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run structure validation
        run: bash scripts/validate.sh
      - name: Run hook tests
        run: node tests/hooks.test.mjs
